<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">短视频到公众号图文工作流</title>
  <desc id="desc">输入短视频链接，经过采集、转写、Markdown 整理、暖光 HTML 渲染，输出到公众号草稿或本地知识库。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#9a3412" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:30px;font-weight:800;fill:#1f2937}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#6b7280}
      .card{fill:#ffffff;stroke:#fed7aa;stroke-width:1.5;filter:url(#shadow)}
      .cardTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:19px;font-weight:800;fill:#c2410c}
      .cardText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#4b5563}
      .arrow{stroke:#fb923c;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .badge{fill:#fff7ed;stroke:#fdba74;stroke-width:1}
      .badgeText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:700;fill:#9a3412}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fb923c"/>
    </marker>
  </defs>
  <rect width="1180" height="360" rx="24" fill="url(#bg)"/>
  <text x="48" y="54" class="title">Short Video Transcript Skill</text>
  <text x="48" y="82" class="sub">短视频链接 → 转写 → Markdown 内容母版 → 原生 HTML 图文稿 → 公众号草稿 / 本地知识库</text>

  <g transform="translate(48,130)">
    <rect class="card" width="150" height="120" rx="18"/>
    <rect class="badge" x="18" y="18" width="58" height="24" rx="12"/>
    <text class="badgeText" x="31" y="35">Input</text>
    <text class="cardTitle" x="18" y="66">短视频链接</text>
    <text class="cardText" x="18" y="92">分享文案 / 短链 / 主页</text>
  </g>

  <path class="arrow" d="M210 190 C230 190,238 190,258 190"/>

  <g transform="translate(270,130)">
    <rect class="card" width="150" height="120" rx="18"/>
    <rect class="badge" x="18" y="18" width="70" height="24" rx="12"/>
    <text class="badgeText" x="31" y="35">Collect</text>
    <text class="cardTitle" x="18" y="66">采集媒体</text>
    <text class="cardText" x="18" y="92">v1: 抖音 + BugPk</text>
  </g>

  <path class="arrow" d="M432 190 C452 190,460 190,480 190"/>

  <g transform="translate(492,130)">
    <rect class="card" width="150" height="120" rx="18"/>
    <rect class="badge" x="18" y="18" width="78" height="24" rx="12"/>
    <text class="badgeText" x="31" y="35">Whisper</text>
    <text class="cardTitle" x="18" y="66">音频转写</text>
    <text class="cardText" x="18" y="92">标点 / 分段 / 校对</text>
  </g>

  <path class="arrow" d="M654 190 C674 190,682 190,702 190"/>

  <g transform="translate(714,130)">
    <rect class="card" width="150" height="120" rx="18"/>
    <rect class="badge" x="18" y="18" width="90" height="24" rx="12"/>
    <text class="badgeText" x="31" y="35">Markdown</text>
    <text class="cardTitle" x="18" y="66">内容母版</text>
    <text class="cardText" x="18" y="92">article.md / dialogue.md</text>
  </g>

  <path class="arrow" d="M876 190 C896 190,904 190,924 190"/>

  <g transform="translate(936,130)">
    <rect class="card" width="150" height="120" rx="18"/>
    <rect class="badge" x="18" y="18" width="62" height="24" rx="12"/>
    <text class="badgeText" x="31" y="35">HTML</text>
    <text class="cardTitle" x="18" y="66">图文稿</text>
    <text class="cardText" x="18" y="92">暖光卡片 / 公众号草稿</text>
  </g>

  <text x="48" y="316" class="sub">主产物：Markdown + 原生 HTML。PDF/DOCX 只是派生导出；公众号配置是可选增强能力。</text>
</svg>
